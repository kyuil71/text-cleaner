<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 클리너 - 오프라인 정제 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f1f5f9;
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* 스크롤바 디자인 */
        .editor-scroll {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .editor-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .editor-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        /* ContentEditable Placeholder 구현 */
        [contenteditable=true]:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
            pointer-events: none;
            display: block;
        }

        /* 입력 및 결과창 내부 이미지 스타일 보존 및 레이아웃 붕괴 방지 */
        #inputBox img, #outputBox img {
            max-width: 100%;
            display: inline-block;
            vertical-align: middle;
        }

        /* 전체 문장 및 내부에 들어오는 모든 블록 요소의 줄간격을 최소화하고 여백을 완전히 제거 */
        #inputBox, #outputBox {
            line-height: 1.15 !important;
        }

        #inputBox p, #inputBox div, #inputBox h1, #inputBox h2, #inputBox h3, #inputBox h4, #inputBox h5, #inputBox h6,
        #outputBox p, #outputBox div, #outputBox h1, #outputBox h2, #outputBox h3, #outputBox h4, #outputBox h5, #outputBox h6 {
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            line-height: 1.15 !important;
        }

        /* 로딩 효과 */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto">
        <!-- 메인 카드 -->
        <div class="bg-white rounded-3xl p-6 md:p-10 custom-shadow border border-slate-100">
            <header class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">로컬 텍스트 클리너</h1>
                <p class="text-slate-500 mt-2">강조 스타일과 이미지는 그대로 유지하고 이모티콘과 불필요한 줄바꿈만 정제합니다.</p>
            </header>

            <div class="space-y-6">
                <!-- 입력 섹션 -->
                <div>
                    <div class="flex items-center justify-between mb-2 ml-1">
                        <label for="inputBox" class="text-sm font-semibold text-slate-700">내용 입력</label>
                        <!-- 서식 툴바 -->
                        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200/60">
                            <button type="button" onclick="format('bold')" title="굵게" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-700 hover:bg-slate-200 font-bold text-sm transition-all">B</button>
                            <button type="button" onclick="format('italic')" title="기울임" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-700 hover:bg-slate-200 italic text-sm transition-all">I</button>
                            <button type="button" onclick="format('underline')" title="밑줄" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-700 hover:bg-slate-200 underline text-sm transition-all">U</button>
                        </div>
                    </div>
                    <!-- contenteditable을 통해 볼드체/스타일 원본 유지 -->
                    <div 
                        id="inputBox" 
                        contenteditable="true"
                        placeholder="변환할 문장을 입력하거나 붙여넣으세요... 굵은 글씨와 이미지 크기는 그대로 보존됩니다." 
                        class="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none overflow-y-auto text-slate-700 editor-scroll"
                    ></div>
                </div>

                <!-- 작업 버튼 -->
                <div class="grid grid-cols-2 gap-3">
                    <button 
                        onclick="clearInput()"
                        class="py-3.5 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all active:scale-95"
                    >
                        지우기
                    </button>
                    <button 
                        id="processBtn"
                        onclick="processTextLocal()"
                        class="py-3.5 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all shadow-md shadow-blue-100 active:scale-95 flex items-center justify-center gap-2"
                    >
                        텍스트 정제하기
                    </button>
                </div>

                <!-- 결과 섹션 -->
                <div id="resultArea" class="hidden animate-in fade-in slide-in-from-top-4 duration-300">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <label class="text-sm font-semibold text-slate-700">정제된 결과</label>
                        <span id="charCount" class="text-xs text-slate-400">0자</span>
                    </div>
                    <div class="space-y-3">
                        <!-- 결과를 똑같이 서식 있는 상태로 렌더링 -->
                        <div 
                            id="outputBox" 
                            class="w-full h-48 p-4 bg-blue-50/50 border border-blue-100 rounded-2xl text-slate-800 outline-none overflow-y-auto editor-scroll"
                        ></div>
                        
                        <!-- 복사 버튼 컨테이너 (두 가지 기능 구현) -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <!-- 서식 포함 복사 -->
                            <button 
                                id="copyFormattedBtn"
                                onclick="copyFormattedResult()"
                                class="w-full py-3.5 px-5 bg-slate-800 hover:bg-black text-white rounded-xl text-sm font-semibold transition-all shadow-lg text-center active:scale-95"
                            >
                                서식·이미지 복사
                            </button>

                            <!-- 순수 텍스트만 복사 -->
                            <button 
                                onclick="copyPlainTextOnly()"
                                class="w-full py-3.5 px-5 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200/80 rounded-xl text-sm font-semibold transition-all text-center active:scale-95"
                            >
                                텍스트만 복사
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 정보 -->
        <p class="text-center text-slate-400 text-sm mt-8">
            인터넷 연결 없이 안전하게 브라우저 내에서 텍스트 서식을 보존하며 정제합니다.
        </p>
    </div>

    <!-- 토스트 알림 메시지 상자 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl text-sm font-medium opacity-0 transition-all pointer-events-none z-50 shadow-xl">
        클립보드에 복사되었습니다.
    </div>

    <script>
        // 간단한 글자 스타일링 수행 기능
        function format(command) {
            document.execCommand(command, false, null);
            document.getElementById('inputBox').focus();
        }

        // 이모티콘 판별 정규식 (재사용을 위해 상수로 분리)
        const EMOJI_REGEX = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}\u{1FA70}-\u{1FAFF}\u{1F1E0}-\u{1F1FF}\u{200D}\u{FE0F}]/gu;

        /* ==========================================================================
           [핵심 버그 수정] 워드/파워포인트에 붙여넣기 시 이미지가 하얗게(빈 칸으로) 나오는 문제
           --------------------------------------------------------------------------
           ▶ 원인:
             웹페이지나 다른 프로그램에서 복사해 붙여넣은 이미지의 주소(src)는 대부분
             "blob:..." (브라우저 임시 메모리 주소) 이거나 "https://..." (외부 웹 주소)입니다.
             - blob: 주소는 그 브라우저 탭 안에서만 유효하기 때문에, 워드/PPT는
               해당 주소에서 이미지를 절대 읽어올 수 없어 흰색 빈 상자만 표시됩니다.
             - https: 외부 주소도 로그인/보안 정책 등으로 워드가 내려받지 못하면
               똑같이 빈 이미지가 됩니다.
           ▶ 해결:
             모든 이미지를 복사 전에 Base64 데이터 URI(data:image/png;base64,...)로
             변환하여, 이미지의 "실제 픽셀 데이터 자체"를 HTML 안에 완전히 심어 넣습니다.
             이렇게 하면 워드/PPT가 외부에 접속할 필요 없이 클립보드 안의 데이터만으로
             이미지를 100% 복원할 수 있습니다.
           ========================================================================== */

        // Blob(이진 데이터) → Base64 데이터 URI 문자열 변환
        function blobToDataURL(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('FileReader 실패'));
                reader.readAsDataURL(blob);
            });
        }

        // 이미지 src 하나를 Base64 데이터 URI로 변환 (2단계 안전장치)
        async function srcToDataURL(src, imgEl) {
            // [1단계] fetch로 원본 파일을 직접 내려받아 변환 (blob: 주소·같은 출처 이미지에 가장 확실)
            //         → 원본 포맷(png/jpg/gif)과 화질이 그대로 유지됩니다.
            try {
                const resp = await fetch(src);
                if (resp.ok) {
                    const blob = await resp.blob();
                    if (blob && blob.size > 0) {
                        const dataUrl = await blobToDataURL(blob);
                        if (dataUrl && dataUrl.startsWith('data:')) return dataUrl;
                    }
                }
            } catch (e) {
                // fetch가 막히면(외부 도메인 보안 정책 등) 2단계로 넘어갑니다.
            }

            // [2단계] 이미지를 캔버스에 다시 그려서 PNG로 추출 (외부 이미지 대비 예비 수단)
            return new Promise((resolve) => {
                const image = new Image();
                image.crossOrigin = 'anonymous';
                image.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = image.naturalWidth || imgEl.width || 300;
                        canvas.height = image.naturalHeight || imgEl.height || 300;
                        canvas.getContext('2d').drawImage(image, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch (err) {
                        // 보안 정책(CORS)으로 캔버스 추출까지 막힌 경우 → 원본 유지
                        resolve(null);
                    }
                };
                image.onerror = () => resolve(null);
                image.src = src;
            });
        }

        // 컨테이너 안의 모든 이미지를 Base64로 임베드 (이미 data:인 이미지는 건너뜀)
        // 반환값: 변환에 실패한 이미지 개수 (사용자 안내용)
        async function embedAllImages(container) {
            const imgs = container.querySelectorAll('img');
            let failed = 0;
            for (const img of imgs) {
                const src = img.getAttribute('src') || '';
                if (!src || src.startsWith('data:')) continue; // 이미 완전히 내장된 이미지
                const dataUrl = await srcToDataURL(src, img);
                if (dataUrl) {
                    img.setAttribute('src', dataUrl);
                } else {
                    failed++;
                }
            }
            return failed;
        }

        // HTML 내부의 텍스트 노드들을 순회하며 필요한 요소들만 지우는 유틸리티
        function cleanTextNodes(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                let text = node.nodeValue;
                const original = text;

                // 1. 모든 종류의 이모티콘 삭제 (쉼표 등 일반 문장부호는 절대 건드리지 않음)
                text = text.replace(EMOJI_REGEX, '');
                
                // 2. 요청 기호 제거 (# 및 *만 제거, 쉼표[,]는 본연의 기본 특성이므로 완전 보존!)
                text = text.replace(/[#*]/g, '');

                // 이모티콘·기호가 지워진 "그 자리"에만 생긴 이중 공백을 한 칸으로 정리합니다.
                if (text !== original) {
                    text = text.replace(/ {2,}/g, ' ');
                }

                node.nodeValue = text;
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.tagName === 'IMG') {
                    return; // 이미지는 자체로 완전하므로 가공을 건너뜁니다.
                }
                for (let i = 0; i < node.childNodes.length; i++) {
                    cleanTextNodes(node.childNodes[i]);
                }
            }
        }

        // 문단의 "실제 마지막 내용물"(텍스트 또는 이미지)을 찾아주는 헬퍼 함수
        function getLastMeaningfulNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const text = node.nodeValue.replace(/[\s\u00a0\u200B]/g, '');
                if (text.length > 0) {
                    return node;
                }
                return null;
            }
            if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.tagName === 'IMG') {
                    return node;
                }
                for (let i = node.childNodes.length - 1; i >= 0; i--) {
                    const found = getLastMeaningfulNode(node.childNodes[i]);
                    if (found) {
                        return found;
                    }
                }
            }
            return null;
        }

        // 마침표 누락 시 보완 기능 (글자/숫자로 끝날 때만 마침표 추가, 이미지·문장부호로 끝나면 원본 보존)
        function ensurePeriod(element) {
            const lastNode = getLastMeaningfulNode(element);
            if (!lastNode || lastNode.nodeType !== Node.TEXT_NODE) return;

            const trimmed = lastNode.nodeValue.replace(/[\s\u00a0\u200B]+$/, '');
            if (trimmed.length === 0) return;

            const lastChar = trimmed.charAt(trimmed.length - 1);
            if (/[\p{L}\p{N}]/u.test(lastChar)) {
                lastNode.nodeValue = trimmed + '.';
            } else {
                lastNode.nodeValue = trimmed;
            }
        }

        // 의미 없는 빈 줄바꿈 태그(<br>) 및 빈 inline 요소들 정리 함수
        function removeTrailingBRs(element) {
            while (element.lastChild) {
                const last = element.lastChild;
                if (last.nodeType === Node.ELEMENT_NODE && last.tagName === 'BR') {
                    element.removeChild(last);
                } else if (last.nodeType === Node.TEXT_NODE && last.nodeValue.replace(/[\s\u00a0\u200B]/g, '').length === 0) {
                    element.removeChild(last);
                } else {
                    break;
                }
            }
        }

        // 실질적인 내용이 존재하지 않는 찌꺼기 요소를 제거하는 함수 (공백 태그는 내용으로 인정하여 보존)
        function removeEmptyElements(element) {
            const children = Array.from(element.childNodes);
            children.forEach(child => {
                if (child.nodeType === Node.ELEMENT_NODE) {
                    removeEmptyElements(child);
                    
                    const hasImg = child.querySelector('img') !== null || child.tagName === 'IMG';
                    const hasBr = child.querySelector('br') !== null || child.tagName === 'BR';
                    const contentText = child.textContent.replace(/[\u200B\uFEFF]/g, '');
                    
                    if (!hasImg && !hasBr && contentText.length === 0) {
                        element.removeChild(child);
                    }
                }
            });
        }

        // 줄바꿈 구조 정리 및 종결 어미 마침표(.) 추가
        function cleanStructureAndAddPeriods(tempDiv) {
            removeEmptyElements(tempDiv);

            const resultDiv = document.createElement('div');
            let currentParagraph = null;

            function flushCurrentParagraph() {
                if (currentParagraph) {
                    removeTrailingBRs(currentParagraph);
                    const text = currentParagraph.textContent.replace(/[\s\u00a0\u200B]/g, '');
                    const hasImage = currentParagraph.querySelector('img') !== null;
                    
                    if (text.length > 0 || hasImage) {
                        ensurePeriod(currentParagraph);
                        resultDiv.appendChild(currentParagraph);
                    }
                    currentParagraph = null;
                }
            }

            Array.from(tempDiv.childNodes).forEach(node => {
                const isBlock = node.nodeType === Node.ELEMENT_NODE && 
                                ['DIV', 'P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'LI'].includes(node.tagName);
                const isBr = node.nodeType === Node.ELEMENT_NODE && node.tagName === 'BR';

                if (isBlock) {
                    flushCurrentParagraph();
                    
                    const clonedBlock = node.cloneNode(true);
                    removeTrailingBRs(clonedBlock);
                    
                    const text = clonedBlock.textContent.replace(/[\s\u00a0\u200B]/g, '');
                    const hasImage = clonedBlock.querySelector('img') !== null;
                    
                    if (text.length > 0 || hasImage) {
                        ensurePeriod(clonedBlock);
                        resultDiv.appendChild(clonedBlock);
                    }
                } else if (isBr) {
                    flushCurrentParagraph();
                } else {
                    if (!currentParagraph) {
                        currentParagraph = document.createElement('div');
                    }
                    currentParagraph.appendChild(node.cloneNode(true));
                }
            });
            
            flushCurrentParagraph();
            return resultDiv.innerHTML;
        }

        // 원본의 줄바꿈 구조는 유지하면서 순수 텍스트 생성 (줄 앞 들여쓰기 보존, 빈 줄만 제거)
        function getCleanPlainText(element) {
            const rawText = element.innerText || element.textContent || "";
            return rawText.split(/\r?\n/)
                .map(line => line
                    .replace(/[\u200B\uFEFF]/g, '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/[ \t]+$/, ''))
                .filter(line => line.trim().length > 0)
                .join('\r\n');
        }

        // 이미지 크기(너비/높이)를 HTML 속성 + 인라인 스타일로 고정하는 함수
        function lockImageSizes(container) {
            const liveImages = container.querySelectorAll('img');
            liveImages.forEach(img => {
                const computed = window.getComputedStyle(img);
                const rect = img.getBoundingClientRect();
                
                let w = img.style.width || computed.width;
                let h = img.style.height || computed.height;
                
                if (!w || w === 'auto') {
                    w = rect.width ? rect.width + 'px' : (img.width ? img.width + 'px' : '');
                }
                if (!h || h === 'auto') {
                    h = rect.height ? rect.height + 'px' : (img.height ? img.height + 'px' : '');
                }
                
                const numW = parseFloat(w);
                const numH = parseFloat(h);
                
                if (numW > 0 && !isNaN(numW)) {
                    img.setAttribute('width', Math.round(numW));
                    img.style.width = numW + 'px';
                }
                if (numH > 0 && !isNaN(numH)) {
                    img.setAttribute('height', Math.round(numH));
                    img.style.height = numH + 'px';
                }
            });
        }

        // 로컬 정제 핵심 함수
        // [수정] 정제 단계에서 미리 모든 이미지를 Base64로 내장(embed)합니다.
        //        이렇게 하면 복사 시점에는 추가 변환이 필요 없어, 복사가 즉시·안정적으로 동작합니다.
        async function processTextLocal() {
            const inputBox = document.getElementById('inputBox');
            
            // 입력창에 글자나 이미지가 모두 없는 경우 작동 방지
            const hasText = inputBox.textContent.trim().length > 0;
            const hasImage = inputBox.querySelector('img') !== null;
            if (!hasText && !hasImage) return;

            const btn = document.getElementById('processBtn');
            const originalBtnHtml = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>처리 중...';

            try {
                // 1. 이미지 크기 확정 (워드/PPT가 크기를 인식하도록 width/height 속성 주입)
                lockImageSizes(inputBox);

                // 2. [핵심] 모든 이미지를 Base64로 변환하여 HTML에 완전히 내장
                //    (blob: 임시 주소나 외부 주소가 남아있으면 워드/PPT에서 하얗게 보이는 원인이 됩니다)
                const failedCount = await embedAllImages(inputBox);

                const temp = document.createElement('div');
                temp.innerHTML = inputBox.innerHTML;

                // 3. 이모티콘 및 요청 기호(# *) 필터링 (쉼표·띄어쓰기·HTML 태그·이미지는 완전 보존)
                cleanTextNodes(temp);

                // 4. 줄바꿈 교정 및 마침표 보정
                const finalHtml = cleanStructureAndAddPeriods(temp);

                const outputBox = document.getElementById('outputBox');
                const resultArea = document.getElementById('resultArea');
                const charCount = document.getElementById('charCount');

                outputBox.innerHTML = finalHtml;
                charCount.innerText = outputBox.textContent.length + "자";
                resultArea.classList.remove('hidden');
                
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });

                if (failedCount > 0) {
                    showToast(failedCount + "개 이미지는 보안 정책으로 변환되지 않아 붙여넣기 시 누락될 수 있습니다.");
                }

            } catch (error) {
                console.error('Processing error:', error);
                showToast("오류가 발생했습니다.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnHtml;
            }
        }

        // 워드/PPT 호환용 복사 HTML 생성 (제목 태그 정규화 + 글자 크기 지시 제거)
        function buildCompatibleHtml(sourceElement) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = sourceElement.innerHTML;

            // 1. H1~H6 태그를 div + strong으로 안전하게 매핑 (PPT/워드에서 글자 크기 폭주 방지)
            const headings = tempDiv.querySelectorAll('h1, h2, h3, h4, h5, h6');
            headings.forEach(h => {
                const div = document.createElement('div');
                const strong = document.createElement('strong');
                strong.innerHTML = h.innerHTML;
                div.appendChild(strong);
                if (h.getAttribute('style')) {
                    div.setAttribute('style', h.getAttribute('style'));
                }
                h.parentNode.replaceChild(div, h);
            });

            // 2. font-size / size / line-height 제거 → PPT가 슬라이드 마스터 본문 크기를 승계
            const allElements = tempDiv.querySelectorAll('*');
            allElements.forEach(el => {
                if (el.style && el.style.fontSize) {
                    el.style.fontSize = '';
                }
                if (el.hasAttribute && el.hasAttribute('size')) {
                    el.removeAttribute('size');
                }
                if (el.style && el.style.lineHeight) {
                    el.style.lineHeight = '';
                }
            });

            // 3. [이미지 호환 강화] 워드/PPT가 확실히 인식하도록 이미지 속성 최종 점검
            const imgs = tempDiv.querySelectorAll('img');
            imgs.forEach(img => {
                // max-width 같은 상대 CSS는 워드에서 무시/오작동할 수 있으므로 제거하고
                // 절대 픽셀 크기(width/height 속성)만 남깁니다.
                if (img.style) {
                    img.style.maxWidth = '';
                    img.style.display = '';
                    img.style.verticalAlign = '';
                }
                if (!img.getAttribute('alt')) {
                    img.setAttribute('alt', 'image');
                }
            });

            // 4. [핵심] 워드/PPT가 인코딩을 정확히 해석하도록 완전한 HTML 문서 형태로 감쌉니다.
            //    (meta charset이 없으면 일부 환경에서 한글이 깨지거나 조각 해석에 실패해
            //     이미지·서식이 통째로 무시되는 경우가 있습니다)
            return '<html><head><meta charset="utf-8"></head><body>' + tempDiv.innerHTML + '</body></html>';
        }

        // 기능 1: 스타일과 이미지가 완전히 내장된 서식(HTML) 데이터 복사
        // [수정] 최신 Clipboard API(navigator.clipboard.write)를 1순위로 사용하고,
        //        미지원 브라우저에서는 기존 execCommand 방식으로 자동 대체합니다.
        async function copyFormattedResult() {
            const outputBox = document.getElementById('outputBox');
            const hasText = outputBox.textContent.trim().length > 0;
            const hasImage = outputBox.querySelector('img') !== null;
            if (!hasText && !hasImage) return;

            const btn = document.getElementById('copyFormattedBtn');
            const originalBtnHtml = btn ? btn.innerHTML : null;
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span>이미지 변환 중...';
            }

            try {
                // [안전장치] 혹시라도 아직 Base64로 변환되지 않은 이미지가 남아있다면
                // 복사 직전에 한 번 더 변환합니다. (정제 단계에서 이미 변환되어 대부분 즉시 통과)
                await embedAllImages(outputBox);

                const htmlContent = buildCompatibleHtml(outputBox);
                const textContent = getCleanPlainText(outputBox);

                let copied = false;

                // [1순위] 최신 Clipboard API — HTML과 텍스트를 동시에 확실하게 기록
                if (navigator.clipboard && window.ClipboardItem) {
                    try {
                        const item = new ClipboardItem({
                            'text/html': new Blob([htmlContent], { type: 'text/html' }),
                            'text/plain': new Blob([textContent], { type: 'text/plain' })
                        });
                        await navigator.clipboard.write([item]);
                        copied = true;
                    } catch (e) {
                        console.warn('Clipboard API 실패, execCommand로 대체:', e);
                    }
                }

                // [2순위] 구형 방식 대체 (execCommand)
                if (!copied) {
                    function listener(e) {
                        e.clipboardData.setData("text/html", htmlContent);
                        e.clipboardData.setData("text/plain", textContent);
                        e.preventDefault();
                    }
                    document.addEventListener("copy", listener);
                    const ok = document.execCommand('copy');
                    document.removeEventListener("copy", listener);
                    copied = ok;
                }

                if (copied) {
                    showToast("이미지가 내장된 상태로 복사되었습니다. 워드/PPT에 붙여넣으세요.");
                } else {
                    showToast("복사에 실패했습니다. 다시 시도해 주세요.");
                }
            } catch (err) {
                console.error('복사 실패:', err);
                showToast("복사 중 오류가 발생했습니다.");
            } finally {
                if (btn && originalBtnHtml !== null) {
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHtml;
                }
            }
        }

        // 기능 2: 모든 서식을 무시하고 오직 순수 텍스트만 복사
        function copyPlainTextOnly() {
            const outputBox = document.getElementById('outputBox');
            if (!outputBox.textContent.trim()) return;

            const textContent = getCleanPlainText(outputBox);

            function listener(e) {
                e.clipboardData.setData("text/plain", textContent);
                e.preventDefault();
            }

            try {
                document.addEventListener("copy", listener);
                document.execCommand('copy');
                document.removeEventListener("copy", listener);
                showToast("순수 텍스트만 복사되었습니다.");
            } catch (err) {
                console.error('복사 실패:', err);
                showToast("복사 중 오류가 발생했습니다.");
            }
        }

        function clearInput() {
            document.getElementById('inputBox').innerHTML = '';
            document.getElementById('resultArea').classList.add('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 3000);
        }
    </script>
</body>
