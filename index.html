<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 클리너 - 지능형 정제 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f1f5f9;
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        textarea {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        textarea::-webkit-scrollbar {
            width: 6px;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        /* 로딩 애니메이션 */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto">
        <!-- 메인 카드 -->
        <div class="bg-white rounded-3xl p-6 md:p-10 custom-shadow border border-slate-100">
            <header class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">AI 텍스트 클리너</h1>
                <p class="text-slate-500 mt-2">이모티콘 제거, 오타 수정 및 문장 교정을 한 번에 처리합니다.</p>
            </header>

            <div class="space-y-6">
                <!-- 입력 섹션 -->
                <div>
                    <label for="inputBox" class="block text-sm font-semibold text-slate-700 mb-2 ml-1">내용 입력</label>
                    <textarea 
                        id="inputBox" 
                        placeholder="변환할 문장을 입력하세요... (오타 수정 및 마침표 자동 추가 지원)" 
                        class="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none resize-none text-slate-700 placeholder:text-slate-400"
                    ></textarea>
                </div>

                <!-- 작업 버튼 -->
                <div class="grid grid-cols-2 gap-3">
                    <button 
                        onclick="clearInput()"
                        class="py-3.5 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all active:scale-95"
                    >
                        지우기
                    </button>
                    <button 
                        id="processBtn"
                        onclick="processText()"
                        class="py-3.5 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all shadow-md shadow-blue-100 active:scale-95 flex items-center justify-center gap-2"
                    >
                        AI 변환하기
                    </button>
                </div>

                <!-- 결과 섹션 (기본 숨김) -->
                <div id="resultArea" class="hidden animate-in fade-in slide-in-from-top-4 duration-300">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <label class="text-sm font-semibold text-slate-700">정제된 결과</label>
                        <span id="charCount" class="text-xs text-slate-400">0자</span>
                    </div>
                    <div class="relative group">
                        <textarea 
                            id="outputBox" 
                            readonly 
                            class="w-full h-48 p-4 bg-blue-50/50 border border-blue-100 rounded-2xl text-slate-800 outline-none resize-none"
                        ></textarea>
                        
                        <button 
                            onclick="copyResult()"
                            class="absolute bottom-4 right-4 bg-slate-800 hover:bg-black text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-all shadow-lg flex items-center gap-2 active:scale-95"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                            </svg>
                            결과 복사하기
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 정보 -->
        <p class="text-center text-slate-400 text-sm mt-8">
            기능: 이모티콘/특수문자 제거, 오타 수정, 줄바꿈 최적화, 마침표 보정
        </p>
    </div>

    <!-- 토스트 알림 메시지 상자 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl text-sm font-medium opacity-0 transition-all pointer-events-none z-50 shadow-xl">
        클립보드에 복사되었습니다!
    </div>

    <script>
        async function processText() {
            const inputBox = document.getElementById('inputBox');
            const input = inputBox.value.trim();
            if (!input) return;

            const btn = document.getElementById('processBtn');
            const originalBtnHtml = btn.innerHTML;
            
            // UI 업데이트: 로딩 상태
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>처리 중...';

            const apiKey = ""; // 환경에서 제공됨
            const systemPrompt = `
                사용자가 제공한 텍스트를 다음 규칙에 따라 정제하세요:
                1. 모든 이모티콘과 특수 기호(*, #, ,)를 삭제하세요.
                2. 불필요한 줄바꿈을 교정하고, 문맥상 자연스럽게 문장을 이어주세요.
                3. 각 문장의 끝에 마침표(.)가 없다면 반드시 추가하세요.
                4. 맞춤법 오류나 오타를 문맥에 맞게 올바르게 수정하세요.
                5. 오직 수정된 텍스트 결과만 출력하세요. 다른 설명은 생략하세요.
            `;

            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error('API 요청 실패');
                    return await response.json();
                } catch (err) {
                    if (retries <= 0) throw err;
                    await new Promise(res => setTimeout(res, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
            };

            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    }
                );

                const cleanedText = result.candidates?.[0]?.content?.parts?.[0]?.text || "변환된 결과가 없습니다.";

                const outputBox = document.getElementById('outputBox');
                const resultArea = document.getElementById('resultArea');
                const charCount = document.getElementById('charCount');

                outputBox.value = cleanedText.trim();
                charCount.innerText = cleanedText.trim().length + "자";
                resultArea.classList.remove('hidden');
                
                setTimeout(() => {
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);

            } catch (error) {
                console.error('Processing error:', error);
                showToast("텍스트 처리 중 오류가 발생했습니다. 다시 시도해 주세요.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnHtml;
            }
        }

        function copyResult() {
            const outputBox = document.getElementById('outputBox');
            if (!outputBox.value) return;

            outputBox.select();
            outputBox.setSelectionRange(0, 99999);

            try {
                document.execCommand('copy');
                showToast("복사가 완료되었습니다! ✨");
            } catch (err) {
                console.error('복사 실패:', err);
            }
            window.getSelection().removeAllRanges();
        }

        function clearInput() {
            document.getElementById('inputBox').value = '';
            document.getElementById('resultArea').classList.add('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2500);
        }
    </script>
</body>
</html>
