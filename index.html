<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 클리너 - 오프라인 정제 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f1f5f9;
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* 스크롤바 디자인 */
        .editor-scroll {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .editor-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .editor-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        /* ContentEditable Placeholder 구현 */
        [contenteditable=true]:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
            pointer-events: none;
            display: block;
        }

        /* 입력 및 결과창 내부 이미지 스타일 보존 및 레이아웃 붕괴 방지 */
        #inputBox img, #outputBox img {
            max-width: 100%;
            display: inline-block;
            vertical-align: middle;
        }

        /* 전체 문장 및 내부에 들어오는 모든 블록 요소의 줄간격을 최소화하고 여백을 완전히 제거 */
        #inputBox, #outputBox {
            line-height: 1.15 !important;
        }

        #inputBox p, #inputBox div, #inputBox h1, #inputBox h2, #inputBox h3, #inputBox h4, #inputBox h5, #inputBox h6,
        #outputBox p, #outputBox div, #outputBox h1, #outputBox h2, #outputBox h3, #outputBox h4, #outputBox h5, #outputBox h6 {
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            line-height: 1.15 !important;
        }

        /* 로딩 효과 (매우 빠르게 처리됨) */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto">
        <!-- 메인 카드 -->
        <div class="bg-white rounded-3xl p-6 md:p-10 custom-shadow border border-slate-100">
            <header class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">로컬 텍스트 클리너</h1>
                <p class="text-slate-500 mt-2">강조 스타일과 이미지는 그대로 유지하고 이모티콘과 불필요한 줄바꿈만 정제합니다.</p>
            </header>

            <div class="space-y-6">
                <!-- 입력 섹션 -->
                <div>
                    <div class="flex items-center justify-between mb-2 ml-1">
                        <label for="inputBox" class="text-sm font-semibold text-slate-700">내용 입력</label>
                        <!-- 서식 툴바 -->
                        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200/60">
                            <button type="button" onclick="format('bold')" title="굵게" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-700 hover:bg-slate-200 font-bold text-sm transition-all">B</button>
                            <button type="button" onclick="format('italic')" title="기울임" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-700 hover:bg-slate-200 italic text-sm transition-all">I</button>
                            <button type="button" onclick="format('underline')" title="밑줄" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-700 hover:bg-slate-200 underline text-sm transition-all">U</button>
                        </div>
                    </div>
                    <!-- contenteditable을 통해 볼드체/스타일 원본 유지 -->
                    <div 
                        id="inputBox" 
                        contenteditable="true"
                        placeholder="변환할 문장을 입력하거나 붙여넣으세요... 굵은 글씨와 이미지 크기는 그대로 보존됩니다." 
                        class="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none overflow-y-auto text-slate-700 editor-scroll"
                    ></div>
                </div>

                <!-- 작업 버튼 -->
                <div class="grid grid-cols-2 gap-3">
                    <button 
                        onclick="clearInput()"
                        class="py-3.5 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all active:scale-95"
                    >
                        지우기
                    </button>
                    <button 
                        id="processBtn"
                        onclick="processTextLocal()"
                        class="py-3.5 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all shadow-md shadow-blue-100 active:scale-95 flex items-center justify-center gap-2"
                    >
                        텍스트 정제하기
                    </button>
                </div>

                <!-- 결과 섹션 -->
                <div id="resultArea" class="hidden animate-in fade-in slide-in-from-top-4 duration-300">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <label class="text-sm font-semibold text-slate-700">정제된 결과</label>
                        <span id="charCount" class="text-xs text-slate-400">0자</span>
                    </div>
                    <div class="space-y-3">
                        <!-- 결과를 똑같이 서식 있는 상태로 렌더링 -->
                        <div 
                            id="outputBox" 
                            class="w-full h-48 p-4 bg-blue-50/50 border border-blue-100 rounded-2xl text-slate-800 outline-none overflow-y-auto editor-scroll"
                        ></div>
                        
                        <!-- 복사 버튼 컨테이너 (두 가지 기능 구현) -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <!-- 서식 포함 복사 -->
                            <button 
                                onclick="copyFormattedResult()"
                                class="w-full py-3.5 px-5 bg-slate-800 hover:bg-black text-white rounded-xl text-sm font-semibold transition-all shadow-lg text-center active:scale-95"
                            >
                                서식·이미지 복사
                            </button>

                            <!-- 순수 텍스트만 복사 -->
                            <button 
                                onclick="copyPlainTextOnly()"
                                class="w-full py-3.5 px-5 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200/80 rounded-xl text-sm font-semibold transition-all text-center active:scale-95"
                            >
                                텍스트만 복사
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 정보 -->
        <p class="text-center text-slate-400 text-sm mt-8">
            인터넷 연결 없이 안전하게 브라우저 내에서 텍스트 서식을 보존하며 정제합니다.
        </p>
    </div>

    <!-- 토스트 알림 메시지 상자 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl text-sm font-medium opacity-0 transition-all pointer-events-none z-50 shadow-xl">
        클립보드에 복사되었습니다.
    </div>

    <script>
        // 간단한 글자 스타일링 수행 기능
        function format(command) {
            document.execCommand(command, false, null);
            document.getElementById('inputBox').focus();
        }

        // 이모티콘 판별 정규식 (재사용을 위해 상수로 분리)
        const EMOJI_REGEX = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}\u{1FA70}-\u{1FAFF}\u{1F1E0}-\u{1F1FF}\u{200D}\u{FE0F}]/gu;

        // HTML 내부의 텍스트 노드들을 순회하며 필요한 요소들만 지우는 유틸리티
        function cleanTextNodes(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                let text = node.nodeValue;
                const original = text;

                // 1. 모든 종류의 이모티콘 삭제 (쉼표 등 일반 문장부호는 절대 건드리지 않음)
                text = text.replace(EMOJI_REGEX, '');
                
                // 2. 요청 기호 제거 (# 및 *만 제거, 쉼표[,]는 본연의 기본 특성이므로 완전 보존!)
                text = text.replace(/[#*]/g, '');

                // [버그 수정] 이모티콘·기호가 지워진 "그 자리"에만 생긴 이중 공백을 한 칸으로 정리합니다.
                // 아무것도 지워지지 않은 텍스트는 원본 띄어쓰기를 100% 그대로 유지합니다.
                if (text !== original) {
                    text = text.replace(/ {2,}/g, ' ');
                }

                node.nodeValue = text;
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                // IMG 태그나 다른 중요 요소들은 자식 탐색을 스킵하거나 그대로 둡니다.
                if (node.tagName === 'IMG') {
                    return; // 이미지는 자체로 완전하므로 가공을 건너뜁니다.
                }
                // 자식 노드들을 계속 탐색
                for (let i = 0; i < node.childNodes.length; i++) {
                    cleanTextNodes(node.childNodes[i]);
                }
            }
        }

        // [버그 수정] 문단의 "실제 마지막 내용물"(텍스트 또는 이미지)을 찾아주는 헬퍼 함수
        // 기존에는 텍스트 노드만 찾아서, 이미지로 끝나는 문장인데도 이미지 앞의 글자에
        // 마침표를 잘못 끼워 넣는 문제가 있었습니다.
        function getLastMeaningfulNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                // 공백 문자나 특수 공백이 아닌 실제 문자가 포함되어 있는지 체크
                const text = node.nodeValue.replace(/[\s\u00a0\u200B]/g, '');
                if (text.length > 0) {
                    return node;
                }
                return null;
            }
            if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.tagName === 'IMG') {
                    return node; // 이미지도 유효한 마지막 내용물로 취급
                }
                for (let i = node.childNodes.length - 1; i >= 0; i--) {
                    const found = getLastMeaningfulNode(node.childNodes[i]);
                    if (found) {
                        return found;
                    }
                }
            }
            return null;
        }

        // 마침표 누락 시 보완 기능
        // [버그 수정 1] 기존에는 마지막 글자가 . ! ? 가 아니면 무조건 마침표를 붙여서
        //   "~했고," 가 "~했고,." 처럼 쉼표 뒤에 마침표가 붙는 문제가 있었습니다.
        //   → 이제 마지막 글자가 '글자(한글/영문/숫자 등)'일 때만 마침표를 추가하고,
        //     쉼표·따옴표·괄호 등 모든 문장부호로 끝나는 문장은 원본 그대로 둡니다.
        // [버그 수정 2] 기존에는 마침표 뒤에 불필요한 공백(' ')을 강제로 추가했습니다. → 제거.
        // [버그 수정 3] 이미지로 끝나는 문단에는 마침표를 추가하지 않습니다.
        function ensurePeriod(element) {
            const lastNode = getLastMeaningfulNode(element);

            // 마지막 내용물이 없거나, 이미지로 끝나는 경우에는 마침표를 추가하지 않음
            if (!lastNode || lastNode.nodeType !== Node.TEXT_NODE) return;

            // 노드 끝의 불필요한 공백만 정리 (문장 중간 띄어쓰기는 손대지 않음)
            const trimmed = lastNode.nodeValue.replace(/[\s\u00a0\u200B]+$/, '');
            if (trimmed.length === 0) return;

            const lastChar = trimmed.charAt(trimmed.length - 1);

            // 마지막 글자가 순수한 '글자 또는 숫자'일 때만 마침표를 붙입니다.
            // (쉼표, 물음표, 느낌표, 말줄임표, 따옴표, 괄호 등으로 끝나면 원본 보존)
            if (/[\p{L}\p{N}]/u.test(lastChar)) {
                lastNode.nodeValue = trimmed + '.';
            } else {
                lastNode.nodeValue = trimmed;
            }
        }

        // 의미 없는 빈 줄바꿈 태그(<br>) 및 빈 inline 요소들 정리 함수
        function removeTrailingBRs(element) {
            while (element.lastChild) {
                const last = element.lastChild;
                if (last.nodeType === Node.ELEMENT_NODE && last.tagName === 'BR') {
                    element.removeChild(last);
                } else if (last.nodeType === Node.TEXT_NODE && last.nodeValue.replace(/[\s\u00a0\u200B]/g, '').length === 0) {
                    element.removeChild(last);
                } else {
                    break;
                }
            }
        }

        // 실질적인 내용이 존재하지 않는 찌꺼기 요소를 제거하는 함수
        // [핵심 버그 수정] 기존에는 "공백만 들어있는 요소"까지 전부 삭제했습니다.
        //   그런데 워드/웹에서 붙여넣은 글은 단어 사이의 띄어쓰기가 <span> </span> 처럼
        //   태그로 감싸져 있는 경우가 매우 많아서, 이 공백 태그가 삭제되면
        //   "안녕 하세요" → "안녕하세요" 처럼 단어가 붙어버리는 문제가 발생했습니다.
        //   → 이제 일반 공백( )과 특수 공백(&nbsp;)은 '의미 있는 내용'으로 취급하여 보존하고,
        //     눈에 보이지 않는 제로폭 문자만 없는 것으로 간주해 진짜 빈 요소만 제거합니다.
        //   (공백만으로 이루어진 '빈 줄' 자체는 이후 단계의 줄 단위 필터에서 안전하게 제거됩니다.)
        function removeEmptyElements(element) {
            const children = Array.from(element.childNodes);
            children.forEach(child => {
                if (child.nodeType === Node.ELEMENT_NODE) {
                    removeEmptyElements(child);
                    
                    const hasImg = child.querySelector('img') !== null || child.tagName === 'IMG';
                    const hasBr = child.querySelector('br') !== null || child.tagName === 'BR';
                    // 제로폭 문자만 제거하고 판별 → 띄어쓰기(공백, &nbsp;)는 내용으로 인정하여 보존
                    const contentText = child.textContent.replace(/[\u200B\uFEFF]/g, '');
                    
                    if (!hasImg && !hasBr && contentText.length === 0) {
                        element.removeChild(child);
                    }
                }
            });
        }

        // 줄바꿈 구조 정리 및 종결 어미 마침표(.) 추가
        function cleanStructureAndAddPeriods(tempDiv) {
            // 내용이 완전히 비어있는 감싸기용 자식 요소 클린업 (공백은 보존)
            removeEmptyElements(tempDiv);

            const resultDiv = document.createElement('div');
            let currentParagraph = null;

            function flushCurrentParagraph() {
                if (currentParagraph) {
                    removeTrailingBRs(currentParagraph);
                    const text = currentParagraph.textContent.replace(/[\s\u00a0\u200B]/g, '');
                    const hasImage = currentParagraph.querySelector('img') !== null;
                    
                    if (text.length > 0 || hasImage) {
                        ensurePeriod(currentParagraph);
                        resultDiv.appendChild(currentParagraph);
                    }
                    currentParagraph = null;
                }
            }

            // 최상위 노드들을 분석하여 줄바꿈 및 문장 끝 체크
            Array.from(tempDiv.childNodes).forEach(node => {
                const isBlock = node.nodeType === Node.ELEMENT_NODE && 
                                ['DIV', 'P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'LI'].includes(node.tagName);
                const isBr = node.nodeType === Node.ELEMENT_NODE && node.tagName === 'BR';

                if (isBlock) {
                    flushCurrentParagraph();
                    
                    const clonedBlock = node.cloneNode(true);
                    removeTrailingBRs(clonedBlock);
                    
                    const text = clonedBlock.textContent.replace(/[\s\u00a0\u200B]/g, '');
                    const hasImage = clonedBlock.querySelector('img') !== null;
                    
                    if (text.length > 0 || hasImage) {
                        ensurePeriod(clonedBlock);
                        resultDiv.appendChild(clonedBlock);
                    }
                } else if (isBr) {
                    flushCurrentParagraph();
                } else {
                    // 인라인 태그들(text, b, strong, span, em, img 등)은 하나의 문맥 문장으로 누적 병합
                    if (!currentParagraph) {
                        currentParagraph = document.createElement('div');
                    }
                    currentParagraph.appendChild(node.cloneNode(true));
                }
            });
            
            flushCurrentParagraph();
            return resultDiv.innerHTML;
        }

        // 원본의 줄바꿈 구조는 유지하면서, 단락 뒤 공백과 의미 없는 빈 줄만 제거하여 텍스트 생성
        // [버그 수정] 기존에는 각 줄의 '앞쪽' 공백까지 전부 제거해서 의도적인 들여쓰기가
        //   사라지는 문제가 있었습니다. → 이제 줄 끝의 공백만 정리하고 줄 앞 띄어쓰기는 보존합니다.
        // 파워포인트 및 메모장 호환성을 위해 CRLF(\r\n) 개행을 명시적으로 사용합니다.
        function getCleanPlainText(element) {
            const rawText = element.innerText || element.textContent || "";
            return rawText.split(/\r?\n/)
                .map(line => line
                    .replace(/[\u200B\uFEFF]/g, '')      // 눈에 보이지 않는 제로폭 문자만 제거
                    .replace(/\u00a0/g, ' ')             // 특수 공백(&nbsp;)은 일반 공백으로 호환 변환
                    .replace(/[ \t]+$/, ''))             // 줄 '끝'의 공백만 제거 (앞 들여쓰기는 보존)
                .filter(line => line.trim().length > 0)  // 내용 없는 빈 줄 완전히 제거
                .join('\r\n'); // Windows 표준 줄바꿈(\r\n)으로 통일하여 파워포인트 및 메모장 모두 완벽 호환
        }

        // 로컬 정제 핵심 함수
        function processTextLocal() {
            const inputBox = document.getElementById('inputBox');
            
            // 워드 등 외부 편집기가 이미지 크기를 정상적으로 인지할 수 있도록, 
            // 실제 브라우저 상에 렌더링되거나 정의된 크기(너비/높이)를 물리적인 HTML5 속성과 절대 인라인 CSS 스타일로 직접 주입합니다.
            const liveImages = inputBox.querySelectorAll('img');
            liveImages.forEach(img => {
                const computed = window.getComputedStyle(img);
                const rect = img.getBoundingClientRect();
                
                let w = img.style.width || computed.width;
                let h = img.style.height || computed.height;
                
                if (!w || w === 'auto') {
                    w = rect.width ? rect.width + 'px' : (img.width ? img.width + 'px' : '');
                }
                if (!h || h === 'auto') {
                    h = rect.height ? rect.height + 'px' : (img.height ? img.height + 'px' : '');
                }
                
                const numW = parseFloat(w);
                const numH = parseFloat(h);
                
                // 워드가 확실하게 읽어들일 수 있게 속성과 인라인 스타일 병합 처리
                if (numW > 0 && !isNaN(numW)) {
                    img.setAttribute('width', numW);
                    img.style.width = numW + 'px';
                }
                if (numH > 0 && !isNaN(numH)) {
                    img.setAttribute('height', numH);
                    img.style.height = numH + 'px';
                }
            });

            const inputHtml = inputBox.innerHTML;
            
            // 입력창에 글자나 이미지가 모두 없는 경우 작동 방지
            const hasText = inputBox.textContent.trim().length > 0;
            const hasImage = inputBox.querySelector('img') !== null;
            if (!hasText && !hasImage) return;

            const btn = document.getElementById('processBtn');
            const originalBtnHtml = btn.innerHTML;
            
            // 로딩 상태 피드백 구현
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>처리 중...';

            setTimeout(() => {
                try {
                    const temp = document.createElement('div');
                    temp.innerHTML = inputHtml;

                    // 1. 이모티콘 및 요청 기호(# *) 필터링 (쉼표와 띄어쓰기, HTML 태그, 이미지 영역은 완전 보존)
                    cleanTextNodes(temp);

                    // 2. 줄바꿈 교정 및 마침표 보정
                    const finalHtml = cleanStructureAndAddPeriods(temp);

                    const outputBox = document.getElementById('outputBox');
                    const resultArea = document.getElementById('resultArea');
                    const charCount = document.getElementById('charCount');

                    outputBox.innerHTML = finalHtml;
                    charCount.innerText = outputBox.textContent.length + "자";
                    resultArea.classList.remove('hidden');
                    
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });

                } catch (error) {
                    console.error('Processing error:', error);
                    showToast("오류가 발생했습니다.");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHtml;
                }
            }, 300);
        }

        // 기능 1: 스타일과 이미지 크기를 지닌 서식(HTML) 데이터 복사 적용
        function copyFormattedResult() {
            const outputBox = document.getElementById('outputBox');
            const hasText = outputBox.textContent.trim().length > 0;
            const hasImage = outputBox.querySelector('img') !== null;
            if (!hasText && !hasImage) return;

            // 임시 에디터를 생성하여 복사용 HTML 구조 클리닝 필터 적용
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = outputBox.innerHTML;

            // 1. PPT/워드에서 극단적으로 글자 크기가 깨지는 H1~H6 태그를 div 표준태그 + strong(굵게)으로 안전하게 매핑합니다.
            const headings = tempDiv.querySelectorAll('h1, h2, h3, h4, h5, h6');
            headings.forEach(h => {
                const div = document.createElement('div');
                const strong = document.createElement('strong');
                strong.innerHTML = h.innerHTML;
                div.appendChild(strong);
                if (h.getAttribute('style')) {
                    div.setAttribute('style', h.getAttribute('style'));
                }
                h.parentNode.replaceChild(div, h);
            });

            // 2. 개별 태그에 묻어있는 font-size 스타일 및 size 어트리뷰트, line-height들을 지워내어 PPT가 슬라이드 마스터 본문 크기를 온전히 승계하도록 유도합니다.
            const allElements = tempDiv.querySelectorAll('*');
            allElements.forEach(el => {
                if (el.style.fontSize) {
                    el.style.fontSize = '';
                }
                if (el.hasAttribute('size')) {
                    el.removeAttribute('size');
                }
                if (el.style.lineHeight) {
                    el.style.lineHeight = '';
                }
            });

            const htmlContent = tempDiv.innerHTML;
            const textContent = getCleanPlainText(outputBox); // 가공된 텍스트와 동기화 적용

            // HTML 형식을 유지하면서도, 일반 텍스트 데이터도 동시에 저장하도록 클립보드에 기록합니다.
            function listener(e) {
                e.clipboardData.setData("text/html", htmlContent);
                e.clipboardData.setData("text/plain", textContent);
                e.preventDefault();
            }

            try {
                document.addEventListener("copy", listener);
                document.execCommand('copy');
                document.removeEventListener("copy", listener);
                showToast("스타일과 이미지가 유지된 채 복사되었습니다.");
            } catch (err) {
                console.error('복사 실패:', err);
                showToast("복사 중 오류가 발생했습니다.");
            }
        }

        // 기능 2: 모든 서식을 무시하고 오직 순수 텍스트만 원본 줄바꿈 그대로 클립보드에 복사 적용 (내용 없는 줄만 스킵)
        function copyPlainTextOnly() {
            const outputBox = document.getElementById('outputBox');
            if (!outputBox.textContent.trim()) return;

            const textContent = getCleanPlainText(outputBox);

            // 오직 text/plain 타입으로만 데이터를 기록해 모든 서식 요소와 이미지를 완전 차단합니다.
            function listener(e) {
                e.clipboardData.setData("text/plain", textContent);
                e.preventDefault();
            }

            try {
                document.addEventListener("copy", listener);
                document.execCommand('copy');
                document.removeEventListener("copy", listener);
                showToast("순수 텍스트만 복사되었습니다.");
            } catch (err) {
                console.error('복사 실패:', err);
                showToast("복사 중 오류가 발생했습니다.");
            }
        }

        function clearInput() {
            document.getElementById('inputBox').innerHTML = '';
            document.getElementById('resultArea').classList.add('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2500);
        }
    </script>
